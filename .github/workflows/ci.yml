name: CI

on:
  push:
    branches: [main, dev-v0.2]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Type check (dashboard)
        run: npm run typecheck:dashboard

      - name: Lint (allow-fail)
        # FASE E-2 (v0.3.0): minimal eslint baseline. Allow-fail
        # initially so a fresh warning never blocks a deploy. Promote
        # to required once the legacy unused-imports backlog is
        # cleaned up — see docs/audits/v0.3.0-team-memory/followups.md.
        run: npm run lint || true
        continue-on-error: true

      - name: Build server + CLI
        run: npm run build

      - name: Build dashboard
        run: npm run dashboard:build

      - name: Run tests
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
